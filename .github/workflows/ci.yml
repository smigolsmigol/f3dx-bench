name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  worker:
    name: worker check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx biome check src

  evidence:
    name: evidence build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evidence-app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
        env:
          R2_PUBLIC_URL: "https://example.invalid"  # build-time placeholder
