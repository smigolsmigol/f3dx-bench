name = "f3dx-bench-ingest"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# ---- BEFORE DEPLOY: fill these in ----
# 1. Create R2 bucket:    wrangler r2 bucket create f3dx-bench-beacons
# 2. Create KV namespace: wrangler kv namespace create f3dx-bench-installs
# 3. Paste the IDs below.
# 4. Set custom domain (optional): wrangler deploy --route bench-ingest.f3d1.dev/*

[[r2_buckets]]
binding = "BEACONS_R2"
bucket_name = "f3dx-bench-beacons"

[[kv_namespaces]]
binding = "INSTALL_KV"
id = "b23c3f02ffe241a38f3a6365272b421a"

# Daily NDJSON -> Parquet compaction. Will be added in v0.0.2.
# [triggers]
# crons = ["0 3 * * *"]
